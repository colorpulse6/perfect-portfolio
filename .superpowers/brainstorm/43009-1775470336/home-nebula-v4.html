<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page — Living Nebula</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #030308; color: #e0e0e0; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; cursor: none; }
  canvas#nebula { position: fixed; inset: 0; z-index: 0; }

  .hello-text {
    position: fixed;
    top: 28%;
    left: 12%;
    font-family: 'Montserrat', -apple-system, sans-serif;
    font-size: 64px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.85);
    z-index: 2;
    text-shadow: 0 0 60px rgba(140,120,255,0.12);
    pointer-events: none;
  }

  .icon-layer { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  .floating-icon {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    width: 46px; height: 46px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    cursor: pointer; pointer-events: all;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .floating-icon:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    transform: scale(1.12);
    box-shadow: 0 0 40px rgba(140,120,255,0.12);
  }
  .floating-icon svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.35); fill: none; stroke-width: 1.5; transition: stroke 0.3s; }
  .floating-icon:hover svg { stroke: rgba(255,255,255,0.8); }
  .icon-appear { animation: materialize var(--dur, 10s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
  @keyframes materialize {
    0% { opacity: 0; transform: scale(0.7) translateY(10px); }
    8% { opacity: 1; transform: scale(1) translateY(0); }
    82% { opacity: 1; transform: scale(1) translateY(-8px); }
    95% { opacity: 0; transform: scale(0.85) translateY(-20px); }
    100% { opacity: 0; transform: scale(0.7) translateY(10px); }
  }

  .terminal {
    position: fixed; bottom: 16px; left: 10%; right: 10%;
    background: rgba(8,8,16,0.82); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
    padding: 14px 20px; font-family: 'SF Mono', 'Fira Code', monospace; z-index: 4;
  }
  .term-dots { display: flex; gap: 6px; margin-bottom: 10px; }
  .term-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .term-line { font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.5); }
  .typed { color: rgba(255,255,255,0.7); border-right: 2px solid rgba(255,255,255,0.4); animation: blink 1s step-end infinite; padding-right: 2px; }
  .prompt { color: rgba(255,255,255,0.15); }
  @keyframes blink { 50% { border-color: transparent; } }

  .sidebar { position: fixed; left: 14px; top: 50%; transform: translateY(-50%); z-index: 5; display: flex; flex-direction: column; gap: 16px; }
  .sb-line { width: 3px; height: 18px; background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* Custom cursor */
  .cursor-glow {
    position: fixed;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(180,160,255,0.3);
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, border-color 0.3s;
    box-shadow: 0 0 20px rgba(140,120,255,0.1);
  }
</style>
</head>
<body>

<canvas id="nebula"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="hello-text">Hello...</div>

<div class="icon-layer">
  <div class="floating-icon icon-appear" style="top:20%;left:68%;--dur:9s;--delay:0s;">
    <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zM21 16c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg>
  </div>
  <div class="floating-icon icon-appear" style="top:55%;left:22%;--dur:11s;--delay:-4s;">
    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </div>
  <div class="floating-icon icon-appear" style="top:72%;left:75%;--dur:12s;--delay:-7s;">
    <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
  </div>
  <div class="floating-icon icon-appear" style="top:38%;left:82%;--dur:10s;--delay:-2s;">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
  </div>
</div>

<div class="terminal">
  <div class="term-dots"><div class="term-dot"></div><div class="term-dot"></div><div class="term-dot"></div></div>
  <div class="term-line">"Signal flow. Troubleshooting. Precision. Sound familiar?"</div>
  <div class="term-line" style="margin-top:4px;"><span class="prompt">&gt;</span> <span class="typed">_</span></div>
</div>

<div class="sidebar">
  <div class="sb-line"></div><div class="sb-line"></div><div class="sb-line"></div><div class="sb-line"></div>
</div>

<script>
const canvas = document.getElementById('nebula');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursorGlow');

let W, H;
let mouse = { x: -1000, y: -1000, px: -1000, py: -1000, speed: 0, active: false };
let particles = [];
const COUNT = 900;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  createParticles();
}

document.addEventListener('mousemove', e => {
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.speed = Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py);
  mouse.active = true;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

const colors = [
  [100, 70, 200],
  [60, 100, 220],
  [160, 90, 210],
  [200, 110, 170],
  [70, 140, 200],
  [120, 70, 160],
  [80, 180, 220],
  [200, 140, 220],
];

function randomColor() {
  return colors[Math.floor(Math.random() * colors.length)];
}

function createParticles() {
  particles = [];

  // Cluster centers that will orbit
  const clusterCount = 7;
  const clusters = [];
  for (let i = 0; i < clusterCount; i++) {
    clusters.push({
      cx: W * 0.15 + Math.random() * W * 0.7,
      cy: H * 0.15 + Math.random() * H * 0.7,
      radius: 80 + Math.random() * 180,
      orbitRadius: 30 + Math.random() * 80,
      orbitSpeed: (0.0003 + Math.random() * 0.0006) * (Math.random() < 0.5 ? 1 : -1),
      phase: Math.random() * Math.PI * 2,
    });
  }

  for (let i = 0; i < COUNT; i++) {
    let x, y, clusterIdx = -1;

    if (Math.random() < 0.65) {
      clusterIdx = Math.floor(Math.random() * clusterCount);
      const c = clusters[clusterIdx];
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.pow(Math.random(), 0.6) * c.radius;
      x = c.cx + Math.cos(angle) * dist;
      y = c.cy + Math.sin(angle) * dist;
    } else {
      // Wanderers — stream between clusters
      x = Math.random() * W;
      y = Math.random() * H;
    }

    const col = randomColor();
    const size = 0.8 + Math.random() * 3;
    const brightness = 0.15 + Math.random() * 0.55;

    // Each particle gets its own orbital motion
    const orbitDist = 15 + Math.random() * 60;
    const orbitSpd = (0.0008 + Math.random() * 0.003) * (Math.random() < 0.5 ? 1 : -1);

    particles.push({
      x, y,
      homeX: x, homeY: y,
      vx: 0, vy: 0,
      // Orbital motion params
      orbitCenterX: x,
      orbitCenterY: y,
      orbitDist,
      orbitSpeed: orbitSpd,
      orbitPhase: Math.random() * Math.PI * 2,
      // Wandering params (large-scale drift)
      driftAngle: Math.random() * Math.PI * 2,
      driftSpeed: 0.05 + Math.random() * 0.2,
      driftChangeRate: 0.001 + Math.random() * 0.003,
      // Visual
      size,
      r: col[0], g: col[1], b: col[2],
      alpha: brightness,
      baseAlpha: brightness,
      depth: 0.3 + Math.random() * 0.7,
      // Cluster membership
      cluster: clusterIdx,
    });
  }

  // Store cluster data for animation
  particles._clusters = clusters;
}

resize();
window.addEventListener('resize', resize);

let time = 0;
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 16.67, 3); // normalize to ~60fps
  lastTime = now;
  time += 0.004 * dt;

  // Fade trail — creates the motion blur / trailing effect
  ctx.fillStyle = 'rgba(3,3,8,0.15)';
  ctx.fillRect(0, 0, W, H);

  const mx = mouse.x;
  const my = mouse.y;
  const clusters = particles._clusters;

  // Animate cluster centers — they slowly orbit their home positions
  for (let c of clusters) {
    c.phase += c.orbitSpeed * dt;
    c.x = c.cx + Math.cos(c.phase) * c.orbitRadius;
    c.y = c.cy + Math.sin(c.phase) * c.orbitRadius;
  }

  for (let i = 0; i < COUNT; i++) {
    const p = particles[i];

    // --- Autonomous movement ---

    // Individual orbital motion (small local orbits)
    p.orbitPhase += p.orbitSpeed * dt;
    const orbX = Math.cos(p.orbitPhase) * p.orbitDist;
    const orbY = Math.sin(p.orbitPhase) * p.orbitDist;

    // Drift — slowly changing direction, creates wandering behavior
    p.driftAngle += (Math.sin(time * 2 + i) * p.driftChangeRate) * dt;
    p.orbitCenterX += Math.cos(p.driftAngle) * p.driftSpeed * dt;
    p.orbitCenterY += Math.sin(p.driftAngle) * p.driftSpeed * dt;

    // If particle belongs to a cluster, its orbit center is pulled toward the cluster
    if (p.cluster >= 0) {
      const c = clusters[p.cluster];
      p.orbitCenterX += (c.x + (p.homeX - c.cx) - p.orbitCenterX) * 0.003 * dt;
      p.orbitCenterY += (c.y + (p.homeY - c.cy) - p.orbitCenterY) * 0.003 * dt;
    } else {
      // Wanderers gently wrap around edges
      if (p.orbitCenterX < -50) p.orbitCenterX = W + 50;
      if (p.orbitCenterX > W + 50) p.orbitCenterX = -50;
      if (p.orbitCenterY < -50) p.orbitCenterY = H + 50;
      if (p.orbitCenterY > H + 50) p.orbitCenterY = -50;
    }

    // Target position = orbit center + orbital offset
    const targetX = p.orbitCenterX + orbX;
    const targetY = p.orbitCenterY + orbY;

    // Smoothly move toward target
    p.vx += (targetX - p.x) * 0.02 * dt;
    p.vy += (targetY - p.y) * 0.02 * dt;

    // --- Cursor interaction ---
    const dx = p.x - mx;
    const dy = p.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const interactionRadius = 160;

    if (dist < interactionRadius && mouse.active) {
      const force = (1 - dist / interactionRadius) * 3 * p.depth;
      const angle = Math.atan2(dy, dx);

      // Repulsion
      p.vx += Math.cos(angle) * force * 0.4 * dt;
      p.vy += Math.sin(angle) * force * 0.4 * dt;

      // Swirl — perpendicular force for that nebula turbulence
      const swirlDir = (i % 2 === 0) ? 1 : -1;
      p.vx += Math.cos(angle + Math.PI * 0.5 * swirlDir) * force * 0.15 * dt;
      p.vy += Math.sin(angle + Math.PI * 0.5 * swirlDir) * force * 0.15 * dt;

      // Brighten
      p.alpha = Math.min(1, p.baseAlpha + (1 - dist / interactionRadius) * 0.6);
    } else {
      p.alpha += (p.baseAlpha - p.alpha) * 0.03 * dt;
    }

    // Damping
    p.vx *= Math.pow(0.94, dt);
    p.vy *= Math.pow(0.94, dt);

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // --- Draw ---
    const glowSize = p.size * (2.5 + p.alpha);
    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
    gradient.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${p.alpha * 0.9})`);
    gradient.addColorStop(0.3, `rgba(${p.r},${p.g},${p.b},${p.alpha * 0.35})`);
    gradient.addColorStop(1, `rgba(${p.r},${p.g},${p.b},0)`);

    ctx.beginPath();
    ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  }

  // Cursor glow in the nebula
  if (mouse.active && mx > 0) {
    const glowRadius = 60 + mouse.speed * 0.3;
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, glowRadius);
    g.addColorStop(0, 'rgba(150,130,255,0.07)');
    g.addColorStop(0.5, 'rgba(120,100,220,0.03)');
    g.addColorStop(1, 'rgba(100,80,200,0)');
    ctx.beginPath();
    ctx.arc(mx, my, glowRadius, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

animate(performance.now());
</script>
</body>
</html>
